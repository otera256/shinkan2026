<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimizer シミュレーター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css">
    <style>
        body {
            background-color: var(--color-math-bg);
            color: var(--color-secondary);
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container-box {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-title {
            color: var(--color-primary);
            border-bottom: 2px solid var(--color-primary-light);
            padding-bottom: 8px;
            margin-bottom: 20px;
        }

        /* グラフエリアのコンテナ */
        .plot-container {
            position: relative;
            width: 100%;
            /* アスペクト比1:1を維持 */
            aspect-ratio: 1 / 1;
            max-width: 600px;
            margin: 0 auto;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #ccc;
            cursor: crosshair;
        }

        /* 重ね合わせるCanvasの設定 */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .control-panel {
            background-color: var(--color-thm-bg);
            padding: 20px;
            border-radius: 8px;
        }

        select, input[type="number"], input[type="range"] {
            border: 1px solid var(--color-primary-light);
            border-radius: 4px;
            padding: 8px;
            width: 100%;
            background-color: white;
            color: var(--color-secondary);
        }

        label {
            display: block;
            text-align: left;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            margin-top: 1rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="container-box">
    <h1 class="header-title text-2xl font-bold">最適化アルゴリズム (Optimizer) シミュレーター</h1>
    <p class="mb-6 text-sm">
        様々なベンチマーク関数の上で、最適化アルゴリズムがどのように最小値（最適解）を探索するかをアニメーションで観察できます。<br>
        <strong>図の上をクリック</strong>すると、その点を初期値として最適化がスタートします。複数回クリックすると過去の軌跡と比較できます。
    </p>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- グラフエリア (PC: 7/12カラム, スマホ: 上部) -->
        <div class="lg:col-span-7 flex flex-col items-center">
            <h2 class="text-lg font-semibold mb-2">関数の等高線グラフ</h2>
            
            <div class="plot-container" id="plot-container">
                <!-- 背景レイヤー（等高線ヒートマップ） -->
                <canvas id="bg-canvas" width="600" height="600"></canvas>
                <!-- 前景レイヤー（軌跡のアニメーション） -->
                <canvas id="fg-canvas" width="600" height="600"></canvas>
            </div>
            
            <div class="w-full max-w-[600px] mt-2 flex justify-between text-xs text-gray-500 font-mono">
                <div>(x_min, y_min) = <span id="label-min"></span></div>
                <div>(x_max, y_max) = <span id="label-max"></span></div>
            </div>
        </div>

        <!-- コントロールパネル (PC: 5/12カラム, スマホ: 下部) -->
        <div class="lg:col-span-5">
            <div class="control-panel">
                <h2 class="text-lg font-semibold mb-4 border-b pb-2 border-gray-300">設定・メニュー</h2>
                
                <label for="func-select">ベンチマーク関数</label>
                <select id="func-select">
                    <!-- JSで動的に追加 -->
                </select>
                <p class="text-xs text-gray-500 mt-1">※関数を変更すると軌跡はリセットされます</p>

                <label for="opt-select">オプティマイザ</label>
                <select id="opt-select">
                    <option value="sgd">SGD (確率的勾配降下法)</option>
                    <option value="momentum">Momentum</option>
                    <option value="adagrad">AdaGrad</option>
                    <option value="rmsprop">RMSprop</option>
                    <option value="adam" selected>Adam</option>
                </select>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="lr-input">学習率 (Learning Rate)</label>
                        <input type="number" id="lr-input" value="0.1" step="0.001" min="0.0001">
                    </div>
                    <div>
                        <label for="speed-input">再生速度 (Step/Frame)</label>
                        <input type="number" id="speed-input" value="5" step="1" min="1" max="100">
                    </div>
                </div>
                <p class="text-xs text-gray-500 mt-1">※学習率が小さい場合は再生速度を上げてください</p>

                <div class="mt-8 flex justify-between items-center">
                    <button id="clear-btn" class="px-6 py-2 bg-[var(--color-secondary)] text-white font-bold rounded hover:bg-gray-800 transition">
                        軌跡をクリア
                    </button>
                    <a href="../index.html" class="text-sm text-[var(--color-primary)] hover:underline">トップへ戻る</a>
                </div>
            </div>

            <!-- 凡例エリア -->
            <div class="mt-6 p-4 border border-gray-200 rounded-lg bg-white">
                <h3 class="text-sm font-bold mb-2">軌跡の履歴</h3>
                <div id="legend-container" class="max-h-48 overflow-y-auto">
                    <!-- 軌跡の履歴がここに追加される -->
                    <div class="text-xs text-gray-400">クリックして最適化を開始してください</div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    // ==========================================
    // 数学・アルゴリズム定義
    // ==========================================
    
    // ベンチマーク関数群
    const funcs = {
        sphere: {
            name: 'Sphere (球関数)',
            f: (x, y) => x*x + y*y,
            domain: [-5, 5, -5, 5]
        },
        beale: {
            name: 'Beale',
            f: (x, y) => Math.pow(1.5 - x + x*y, 2) + Math.pow(2.25 - x + x*y*y, 2) + Math.pow(2.625 - x + x*Math.pow(y, 3), 2),
            domain: [-4.5, 4.5, -4.5, 4.5]
        },
        rosenbrock: {
            name: 'Rosenbrock (バナナ関数)',
            f: (x, y) => Math.pow(1-x, 2) + 100 * Math.pow(y - x*x, 2),
            domain: [-2, 2, -1, 3]
        },
        ackley: {
            name: 'Ackley',
            f: (x, y) => {
                const p1 = -20 * Math.exp(-0.2 * Math.sqrt(0.5 * (x*x + y*y)));
                const p2 = -Math.exp(0.5 * (Math.cos(2*Math.PI*x) + Math.cos(2*Math.PI*y)));
                return p1 + p2 + Math.E + 20;
            },
            domain: [-5, 5, -5, 5]
        },
        rastrigin: {
            name: 'Rastrigin',
            f: (x, y) => 20 + x*x - 10*Math.cos(2*Math.PI*x) + y*y - 10*Math.cos(2*Math.PI*y),
            domain: [-5.12, 5.12, -5.12, 5.12]
        },
        levi: {
            name: 'Levi N.13',
            f: (x, y) => Math.pow(Math.sin(3*Math.PI*x), 2) + 
                         Math.pow(x-1, 2) * (1 + Math.pow(Math.sin(3*Math.PI*y), 2)) + 
                         Math.pow(y-1, 2) * (1 + Math.pow(Math.sin(2*Math.PI*y), 2)),
            domain: [-10, 10, -10, 10]
        },
        booth: {
            name: 'Booth',
            f: (x, y) => Math.pow(x + 2*y - 7, 2) + Math.pow(2*x + y - 5, 2),
            domain: [-10, 10, -10, 10]
        },
        matyas: {
            name: 'Matyas',
            f: (x, y) => 0.26*(x*x + y*y) - 0.48*x*y,
            domain: [-10, 10, -10, 10]
        }
    };

    // 数値微分による勾配計算 (Central Difference)
    function grad(f, x, y) {
        const h = 1e-5;
        const dx = (f(x+h, y) - f(x-h, y)) / (2*h);
        const dy = (f(x, y+h) - f(x, y-h)) / (2*h);
        return [dx, dy];
    }

    // オプティマイザのクラス定義
    class SGD {
        update(x, y, dx, dy, lr) { return [x - lr*dx, y - lr*dy]; }
    }
    class Momentum {
        constructor(mu=0.9) { this.vx = 0; this.vy = 0; this.mu = mu; }
        update(x, y, dx, dy, lr) {
            this.vx = this.mu * this.vx + dx;
            this.vy = this.mu * this.vy + dy;
            return [x - lr*this.vx, y - lr*this.vy];
        }
    }
    class AdaGrad {
        constructor() { this.sx = 0; this.sy = 0; this.eps = 1e-8; }
        update(x, y, dx, dy, lr) {
            this.sx += dx*dx; this.sy += dy*dy;
            return [x - lr * dx / (Math.sqrt(this.sx) + this.eps), y - lr * dy / (Math.sqrt(this.sy) + this.eps)];
        }
    }
    class RMSprop {
        constructor(alpha=0.99) { this.vx = 0; this.vy = 0; this.alpha = alpha; this.eps = 1e-8; }
        update(x, y, dx, dy, lr) {
            this.vx = this.alpha * this.vx + (1 - this.alpha) * dx * dx;
            this.vy = this.alpha * this.vy + (1 - this.alpha) * dy * dy;
            return [x - lr * dx / (Math.sqrt(this.vx) + this.eps), y - lr * dy / (Math.sqrt(this.vy) + this.eps)];
        }
    }
    class Adam {
        constructor(beta1=0.9, beta2=0.999) {
            this.mx=0; this.my=0; this.vx=0; this.vy=0;
            this.beta1=beta1; this.beta2=beta2; this.eps=1e-8; this.t=0;
        }
        update(x, y, dx, dy, lr) {
            this.t++;
            this.mx = this.beta1 * this.mx + (1 - this.beta1) * dx;
            this.my = this.beta1 * this.my + (1 - this.beta1) * dy;
            this.vx = this.beta2 * this.vx + (1 - this.beta2) * dx * dx;
            this.vy = this.beta2 * this.vy + (1 - this.beta2) * dy * dy;
            const mhatx = this.mx / (1 - Math.pow(this.beta1, this.t));
            const mhaty = this.my / (1 - Math.pow(this.beta1, this.t));
            const vhatx = this.vx / (1 - Math.pow(this.beta2, this.t));
            const vhaty = this.vy / (1 - Math.pow(this.beta2, this.t));
            return [x - lr * mhatx / (Math.sqrt(vhatx) + this.eps), y - lr * mhaty / (Math.sqrt(vhaty) + this.eps)];
        }
    }

    function createOptimizer(name) {
        switch(name) {
            case 'sgd': return new SGD();
            case 'momentum': return new Momentum();
            case 'adagrad': return new AdaGrad();
            case 'rmsprop': return new RMSprop();
            case 'adam': return new Adam();
            default: return new Adam();
        }
    }

    // ==========================================
    // UI・描画処理
    // ==========================================

    const bgCanvas = document.getElementById('bg-canvas');
    const fgCanvas = document.getElementById('fg-canvas');
    const ctxBg = bgCanvas.getContext('2d', { alpha: false }); // 最適化のためalphaオフ
    const ctxFg = fgCanvas.getContext('2d');
    
    // Canvasの論理サイズを固定 (高解像度で見栄え良く)
    const WIDTH = 600;
    const HEIGHT = 600;
    
    const funcSelect = document.getElementById('func-select');
    const optSelect = document.getElementById('opt-select');
    const lrInput = document.getElementById('lr-input');
    const speedInput = document.getElementById('speed-input');
    const clearBtn = document.getElementById('clear-btn');
    const legendContainer = document.getElementById('legend-container');

    // 関数セレクトボックスの初期化
    for (const [key, val] of Object.entries(funcs)) {
        const opt = document.createElement('option');
        opt.value = key;
        opt.innerText = val.name;
        funcSelect.appendChild(opt);
    }
    // デフォルト関数をRosenbrockにしておく
    funcSelect.value = 'rosenbrock';

    let currentFuncKey = funcSelect.value;
    let trajectories = [];
    let isAnimating = false;

    // トラジェクトリー用カラーパレット (ネオン系で見やすく)
    const colorPalette = [
        '#ff0055', '#00e5ff', '#39ff14', '#ffff00', '#a200ff', '#ff8800', '#ffffff'
    ];
    let colorIndex = 0;

    // 座標変換ヘルパー
    function toScreenX(x, domain) { return (x - domain[0]) / (domain[1] - domain[0]) * WIDTH; }
    function toScreenY(y, domain) { return HEIGHT - (y - domain[2]) / (domain[3] - domain[2]) * HEIGHT; }
    function toWorldX(sx, domain) { return sx / WIDTH * (domain[1] - domain[0]) + domain[0]; }
    function toWorldY(sy, domain) { return domain[3] - sy / HEIGHT * (domain[3] - domain[2]); }

    // 背景ヒートマップ描画
    function renderBackground() {
        const funcDef = funcs[currentFuncKey];
        const [minX, maxX, minY, maxY] = funcDef.domain;
        
        document.getElementById('label-min').innerText = `${minX.toFixed(1)}, ${minY.toFixed(1)}`;
        document.getElementById('label-max').innerText = `${maxX.toFixed(1)}, ${maxY.toFixed(1)}`;

        const imgData = ctxBg.createImageData(WIDTH, HEIGHT);
        const zs = new Float32Array(WIDTH * HEIGHT);
        let minZ = Infinity, maxZ = -Infinity;

        // 計算
        for (let py = 0; py < HEIGHT; py++) {
            for (let px = 0; px < WIDTH; px++) {
                const x = toWorldX(px, funcDef.domain);
                const y = toWorldY(py, funcDef.domain);
                const z = funcDef.f(x, y);
                // 対数スケールで見やすく（負の値は0にクランプ）
                const logZ = Math.log(Math.max(z, 0) + 1e-5);
                zs[py * WIDTH + px] = logZ;
                if (logZ < minZ) minZ = logZ;
                if (logZ > maxZ) maxZ = logZ;
            }
        }

        // 色付け (等高線風)
        for (let i = 0; i < zs.length; i++) {
            let norm = (zs[i] - minZ) / (maxZ - minZ + 1e-10);
            
            // 階調化 (15段階)
            const levels = 15;
            norm = Math.floor(norm * levels) / levels; 
            
            let r, g, b;
            // 青 -> シアン -> 黄色 -> 赤のカスタムグラデーション
            if (norm < 0.33) {
                const t = norm / 0.33;
                r = 14 + t*(0 - 14); g = 11 + t*(150 - 11); b = 49 + t*(255 - 49);
            } else if (norm < 0.66) {
                const t = (norm - 0.33) / 0.33;
                r = 0 + t*(255 - 0); g = 150 + t*(255 - 150); b = 255 + t*(0 - 255);
            } else {
                const t = (norm - 0.66) / 0.34;
                r = 255 + t*(255 - 255); g = 255 + t*(0 - 255); b = 0 + t*(0 - 0);
            }

            imgData.data[i*4] = r;
            imgData.data[i*4+1] = g;
            imgData.data[i*4+2] = b;
            imgData.data[i*4+3] = 255;
        }
        ctxBg.putImageData(imgData, 0, 0);
    }

    // 軌跡の描画
    function drawTrajectories() {
        ctxFg.clearRect(0, 0, WIDTH, HEIGHT);
        const domain = funcs[currentFuncKey].domain;

        ctxFg.lineCap = 'round';
        ctxFg.lineJoin = 'round';

        trajectories.forEach(traj => {
            if (traj.path.length === 0) return;

            ctxFg.beginPath();
            ctxFg.lineWidth = 3;
            ctxFg.strokeStyle = traj.color;
            
            // 最初の点
            const startX = toScreenX(traj.path[0].x, domain);
            const startY = toScreenY(traj.path[0].y, domain);
            ctxFg.moveTo(startX, startY);

            for (let i = 1; i < traj.path.length; i++) {
                const sx = toScreenX(traj.path[i].x, domain);
                const sy = toScreenY(traj.path[i].y, domain);
                ctxFg.lineTo(sx, sy);
            }
            ctxFg.stroke();

            // 最新の位置にドットを描画
            const last = traj.path[traj.path.length - 1];
            ctxFg.beginPath();
            ctxFg.arc(toScreenX(last.x, domain), toScreenY(last.y, domain), 5, 0, Math.PI * 2);
            ctxFg.fillStyle = traj.color;
            ctxFg.fill();
            ctxFg.strokeStyle = '#fff';
            ctxFg.lineWidth = 1;
            ctxFg.stroke();
        });
    }

    // アニメーションループ
    function animLoop() {
        let anyRunning = false;
        const speed = parseInt(speedInput.value) || 1;
        const funcDef = funcs[currentFuncKey];
        const domain = funcDef.domain;

        for (const traj of trajectories) {
            if (!traj.running) continue;
            anyRunning = true;
            
            for (let step = 0; step < speed; step++) {
                const lastPos = traj.path[traj.path.length - 1];
                const [dx, dy] = grad(funcDef.f, lastPos.x, lastPos.y);
                const [nx, ny] = traj.optInst.update(lastPos.x, lastPos.y, dx, dy, traj.lr);
                
                traj.path.push({x: nx, y: ny});
                
                // 終了判定: 勾配がほぼゼロ
                if (Math.abs(dx) < 1e-6 && Math.abs(dy) < 1e-6) {
                    traj.running = false;
                    break;
                }
                // 終了判定: 領域外に飛び出した
                if (nx < domain[0] || nx > domain[1] || ny < domain[2] || ny > domain[3]) {
                    traj.running = false;
                    break;
                }
                // 終了判定: ステップ数が多すぎる (無限ループ防止)
                if (traj.path.length > 50000) {
                    traj.running = false;
                    break;
                }
            }
        }
        
        drawTrajectories();
        
        if (anyRunning) {
            requestAnimationFrame(animLoop);
        } else {
            isAnimating = false;
        }
    }

    function updateLegend() {
        legendContainer.innerHTML = '';
        if (trajectories.length === 0) {
            legendContainer.innerHTML = '<div class="text-xs text-gray-400">クリックして最適化を開始してください</div>';
            return;
        }

        trajectories.forEach((traj, idx) => {
            const item = document.createElement('div');
            item.className = 'legend-item';
            
            const colorBox = document.createElement('div');
            colorBox.className = 'legend-color';
            colorBox.style.backgroundColor = traj.color;

            const text = document.createElement('div');
            text.innerText = `[${idx+1}] ${traj.optName} (LR=${traj.lr})`;

            item.appendChild(colorBox);
            item.appendChild(text);
            legendContainer.appendChild(item);
        });
        
        // 自動スクロール
        legendContainer.scrollTop = legendContainer.scrollHeight;
    }

    // キャンバスクリックイベント
    document.getElementById('plot-container').addEventListener('mousedown', (e) => {
        const rect = e.target.getBoundingClientRect();
        // CSS上のサイズと論理サイズの比率を計算
        const scaleX = WIDTH / rect.width;
        const scaleY = HEIGHT / rect.height;

        const screenX = (e.clientX - rect.left) * scaleX;
        const screenY = (e.clientY - rect.top) * scaleY;

        const domain = funcs[currentFuncKey].domain;
        const startX = toWorldX(screenX, domain);
        const startY = toWorldY(screenY, domain);

        const optName = optSelect.options[optSelect.selectedIndex].text;
        const lr = parseFloat(lrInput.value);
        
        const traj = {
            path: [{x: startX, y: startY}],
            color: colorPalette[colorIndex % colorPalette.length],
            running: true,
            optName: optName,
            optInst: createOptimizer(optSelect.value),
            lr: lr
        };
        
        colorIndex++;
        trajectories.push(traj);
        updateLegend();

        if (!isAnimating) {
            isAnimating = true;
            requestAnimationFrame(animLoop);
        }
    });

    // イベントリスナー
    funcSelect.addEventListener('change', (e) => {
        currentFuncKey = e.target.value;
        trajectories = [];
        colorIndex = 0;
        updateLegend();
        renderBackground();
        drawTrajectories();
        
        // 関数ごとに適正な学習率の初期値を変更する（利便性のため）
        if (currentFuncKey === 'rosenbrock') lrInput.value = '0.001';
        else if (currentFuncKey === 'ackley') lrInput.value = '0.05';
        else if (currentFuncKey === 'beale') lrInput.value = '0.005';
        else lrInput.value = '0.1';
    });

    clearBtn.addEventListener('click', () => {
        trajectories = [];
        colorIndex = 0;
        updateLegend();
        drawTrajectories();
    });

    // 初期化
    renderBackground();

</script>
</body>
</html>
